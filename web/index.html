<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="landscape" />
  <title>SURGE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a0a0a;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #terminal-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #terminal {
      /* sized by JS based on viewport tier */
    }

    /* xterm overrides */
    .xterm { height: 100%; }
    .xterm-viewport { overflow: hidden !important; }
    .xterm-screen { margin: 0 auto; }

    /* Rotate prompt for portrait mobile */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      color: #33ffff;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }

    #rotate-prompt .icon {
      font-size: 3rem;
    }

    #rotate-prompt .msg {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-prompt { display: flex; }
      #terminal-wrap { display: none; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div class="icon">&#x21BB;</div>
    <div>ROTATE DEVICE</div>
    <div class="msg">surge requires landscape orientation</div>
  </div>
  <div id="terminal-wrap">
    <div id="terminal"></div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
