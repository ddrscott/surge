name = "surge"
main = "./worker/index.ts"
compatibility_date = "2025-06-01"

[[routes]]
pattern = "surge.ljs.app"
custom_domain = true

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Auth: shared JWT_SECRET with auth.ljs.app (set via `wrangler secret put JWT_SECRET`)
# Local dev: add JWT_SECRET to .dev.vars

