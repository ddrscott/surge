name = "surge"
main = "./worker/index.ts"
compatibility_date = "2025-06-01"

[[routes]]
pattern = "surge.ljs.app"
custom_domain = true

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Auth: shared JWT_SECRET with auth.ljs.app (set via `wrangler secret put JWT_SECRET`)
# Local dev: add JWT_SECRET to .dev.vars

[[d1_databases]]
binding = "DB"
database_name = "surge-db"
database_id = "f4fd1c96-9165-4a48-9a8c-867ee272d814"
# Apply migrations: npx wrangler d1 migrations apply surge-db
